services:
  - type: pserv
    name: paradedb
    runtime: image
    image:
      url: docker.io/paradedb/paradedb:latest
    plan: standard
    autoDeploy: true
    disk:
      name: data
      mountPath: /var/lib/postgresql
      sizeGB: 10
    envVars:
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: paradedb
